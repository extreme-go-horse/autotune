name: Copilot Review
on:
  pull_request:
    types: [opened, ready_for_review]
jobs:
  copilot-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Request Copilot Review
        run: gh pr edit ${{ github.event.pull_request.number }} --add-reviewer @me/copilot-reviews || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
